name: Build Push Deploy 

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: lewismoe/minikube-time-printer
  HELM_PATH: helm/

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t $IMAGE_NAME:$TAG .

      - name: Push image
        run: docker push $IMAGE_NAME:$TAG

      - name: Update Helm values.yaml
        run: |
          sed -i "s|tag:.*|tag: \"$TAG\"|g" $HELM_PATH/values.yaml

      - name: Commit & push Helm update
        run: |
          git config --global user.name "LearningJourneyy"
          git config --global user.email "learningjourney.labs@gmail.com"

          git add .
          git commit -m "Update image tag to $TAG" 
          git push

