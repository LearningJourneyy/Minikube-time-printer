apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minikube-time-printer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LearningJourneyy/Minikube-time-printer
    targetRevision: HEAD
    path: helm/
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
